<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="heading">Welcome to Room </h1>
    <div class="colors" style="display: flex; justify-content: space-evenly;">
        <input type="button" onclick="colorChange('red')" name="red" style="width: 20px; height: 20px; border-radius:   10px; background-color: red; "></input>
        <input type="button" onclick="colorChange('yellow')" name="yellow" style="width: 20px; height: 20px; border-radius:   10px; background-color: yellow; "></input>
        <input type="button" onclick="colorChange('green')" name="green" style="width: 20px; height: 20px; border-radius:   10px; background-color: green; "></input>
        <input type="button" onclick="colorChange('blue')"name="blue" style="width: 20px; height: 20px; border-radius:   10px; background-color: blue; "></input>
        <input type="button" onclick="colorChange('black')" name="black" style="width: 20px; height: 20px; border-radius:   10px; background-color: black; "></input>
    </div>
    <canvas id="whiteboard" width="800" height="500" style="border:2px solid black; background: white;"></canvas>
   <script src="/socket.io/socket.io.js"></script>
     <script>
         const socket= io();
         const urlparams=new URLSearchParams(window.location.search)
         let head=document.getElementById('heading');
         let roomno=urlparams.get('room');
         let name=urlparams.get('name');
         let email=urlparams.get('email');
         head.innerText=`Welcome to Room ${roomno}`

         let canvas=document.getElementById('whiteboard');
         const ctx=canvas.getContext('2d');
        // Configure the pen
         ctx.lineWidth = 2;
         ctx.lineCap = 'round'; // Makes lines smooth, not blocky
        let penColor='black';
         function colorChange(color){
           penColor=color;
           ctx.strokeStyle = penColor;
         }
         socket.on('coordinates',(data)=>{
            console.log("data:",data); 
            // let div=document.createElement('div');
            // div.style.width='3px';
            // div.style.height='3px';
            // div.style.position = 'absolute';
            // div.style.borderRadius='1.5px';
            // div.style.backgroundColor='black';
            // div.style.left=data.x+'px';
            // div.style.top=data.y+'px';
            // canvas.appendChild(div)

            // Draw a small line/dot at the received coordinates
            ctx.lineTo(data.x,data.y);
            ctx.stroke();
            ctx.beginPath();// Start a fresh path for the next point
            ctx.moveTo(data.x,data.y)
            ctx.strokeStyle=data.penColor;
        })
        socket.on('stop-drawing',()=>{
            ctx.beginPath();
        })
        socket.on('join:draw',(info)=>{
            console.log("info",info);  
        })
        socket.emit('join:club',{name:name,email:email,room:roomno})

        function taar(e){
            if(e) e.preventDefault();
            let isDrawing=false;
            window.addEventListener('mouseup',()=>
            {
                if(isDrawing) {
                isDrawing = false;
                ctx.beginPath();
                socket.emit('stop-drawing', { room: roomno });
            }
            })
            canvas.addEventListener('mousedown',(e)=>{
              isDrawing = true;
            // We must "jump" the pen to the start point immediately
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                 draw(e);
            })
            canvas.addEventListener('mousemove',draw);
               
            function draw(e){
                if(!isDrawing) return ;
                //Get coordinates relative to the canvas borders

                const rect=canvas.getBoundingClientRect()
             // FIX 2: Use e.clientX and e.clientY
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

                // Draw on our own screen immediately (for speed)
                ctx.lineTo(x,y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x,y);
                const payload={name:name,room:roomno,x,y,penColor}
                socket.emit('coordinates',payload)
            }
         }
         taar();
     </script>
</body>
</html>
